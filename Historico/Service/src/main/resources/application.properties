spring.application.name=historico-service

spring.datasource.url=jdbc:postgresql://postgres-credito:5432/historicodb
spring.datasource.username=exemplouser
spring.datasource.password=exemplo123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
spring.kafka.bootstrap-servers=kafka:9092

spring.kafka.consumer.group-id=historico-service-group-v1
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.value.default.type=Historico_Service.DTO.CreditoCriadoDTO

spring.kafka.consumer.properties.spring.json.value.type.mappings=Credito_Service.DTO.CreditoEventoHistoricoDTO:Historico_Service.DTO.CreditoCriadoDTO

spring.kafka.consumer.properties.spring.json.trusted.packages=Historico_Service.DTO.*
spring.kafka.consumer.properties.spring.json.use.type.headers=false

logging.level.org.springframework.kafka=INFO
logging.level.comconsumerNotificacao=DEBUG

server.port=8081
management.tracing.enabled=true
management.tracing.sampling.probability=1.0

logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

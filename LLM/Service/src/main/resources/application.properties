spring.application.name=llm-service

spring.datasource.url=jdbc:postgresql://postgres-credito:5432/llmdb
spring.datasource.username=exemplouser
spring.datasource.password=exemplo123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.kafka.bootstrap-servers=kafka:9092

spring.kafka.consumer.group-id=llm-service-group-v1
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.value.type.mappings=LLM.Service.DTO.ScoreAtualizadoEventoDTO:Score.Service.DTO.ScoreEventoDTO

spring.kafka.consumer.properties.spring.json.trusted.packages=LLM.Service.DTO.*,Score.Service.DTO.*
spring.kafka.consumer.properties.spring.json.use.type.headers=false

logging.level.org.springframework.kafka=INFO


server.port=8083
spring.ai.anthropic.api-key=sua-chave-aqui
spring.ai.anthropic.chat.options.model=claude-sonnet-4-20250514

spring.application.name=score-service

spring.datasource.url=jdbc:postgresql://postgres-credito:5432/scoredb
spring.datasource.username=exemplouser
spring.datasource.password=exemplo123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.kafka.bootstrap-servers=kafka:9092

spring.kafka.consumer.group-id=score-service-group-v1
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.value.type.mappings=Credito_Service.DTO.CreditoEventoDTO:Score.Service.DTO.CreditoCriadoEventoDTO,Historico_Service.DTO.HistoricoEventoDTO:Score.Service.DTO.HistoricoCriadoEventoDTO

spring.kafka.consumer.properties.spring.json.trusted.packages=Score.Service.DTO.*,Credito_Service.DTO.*,Historico_Service.DTO.*
spring.kafka.consumer.properties.spring.json.use.type.headers=false

logging.level.org.springframework.kafka=INFO
management.tracing.enabled=true
management.tracing.sampling.probability=1.0

logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

server.port=8082

